appId: com.ezcut.app
productName: ezcut
copyright: Copyright © 2026 ezcut contributors

directories:
  buildResources: build
  output: dist

files:
  - out/**
  - package.json
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,electron-builder.yml}"
  - "!{.gitignore,.npmrc,README.md,DEVPLAN.md,DECISIONS.md,CLAUDE.md}"
  - "!.claude/**"

# ffmpeg/ffprobe binaries cannot run from inside app.asar. They must be unpacked
# so the resolved binary path (rewritten app.asar -> app.asar.unpacked) is executable.
asarUnpack:
  - node_modules/ffmpeg-static/**
  - node_modules/ffprobe-static/**

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

# macOS signing/notarization is off for MVP (see DEVPLAN), but the mic usage
# string, hardened runtime, and audio-input entitlement are wired so notarized
# recording works once signing is switched on.
mac:
  target:
    - dmg
  category: public.app-category.video
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: ezcut needs microphone access to record voiceovers.

linux:
  target:
    - AppImage
  category: AudioVideo
